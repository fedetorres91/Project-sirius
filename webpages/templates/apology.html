{% extends "layout.html" %}

{% block title %}
    Oops!
{% endblock %}

{% block main %}
    <div class="auth-container fade-in">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-emoji-frown text-danger fs-1 mb-3 d-block"></i>
                <h3 class="mb-3">{{ top }}</h3>
                <!-- https://memegen.link/ -->
                <!-- https://knowyourmeme.com/memes/grumpy-cat -->
                <img alt="{{ top }}" class="rounded shadow img-fluid mb-4" src="https://api.memegen.link/images/custom/{{ top | urlencode }}/{{ bottom | urlencode }}.jpg?background=https://i.imgur.com/CsCgN7Ll.png&width=400" title="{{ top }}">
                <div class="mt-4">
                    <a href="/" class="btn btn-primary"><i class="bi bi-house-door me-2"></i>Go Home</a>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2"><i class="bi bi-arrow-left me-2"></i>Go Back</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
