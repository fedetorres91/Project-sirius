{% extends "layout.html" %}

{% block title %}
    Change Password
{% endblock %}

{% block main %}
    <div class="auth-container fade-in">
        <div class="card">
            <div class="card-header text-center">
                <i class="bi bi-shield-lock-fill fs-1 mb-2 d-block"></i>
                <h4 class="mb-0">Change Password</h4>
                <small class="opacity-75">Keep your account secure</small>
            </div>
            <div class="card-body">
                <form action="/change_password" method="post">
                    <div class="mb-4">
                        <label for="current_password" class="form-label"><i class="bi bi-key me-1"></i>Current Password</label>
                        <input autocomplete="off" autofocus class="form-control" id="current_password" name="current_password" placeholder="Enter your current password" type="password" required>
                    </div>
                    <hr class="my-4">
                    <div class="mb-4">
                        <label for="new_password" class="form-label"><i class="bi bi-lock me-1"></i>New Password</label>
                        <input autocomplete="off" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" type="password" required>
                        <div class="form-text"><i class="bi bi-info-circle me-1"></i>Choose a strong, unique password</div>
                    </div>
                    <div class="mb-4">
                        <label for="confirmation" class="form-label"><i class="bi bi-lock-fill me-1"></i>Confirm New Password</label>
                        <input autocomplete="off" class="form-control" id="confirmation" name="confirmation" placeholder="Confirm new password" type="password" required>
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg" type="submit">
                            <i class="bi bi-check-lg me-2"></i>Update Password
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light py-3">
                <a href="/home" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to Dashboard</a>
            </div>
        </div>
    </div>
{% endblock %}
